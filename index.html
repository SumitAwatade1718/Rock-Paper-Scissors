<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="parent">
      <div class="header">
        <img
          class="header-emoji"
          src="https://png.pngtree.com/png-vector/20241001/ourmid/pngtree-smiling-face-with-thumbs-up-emoji-png-image_13994371.png"
          alt="Thumbs up emoji"
        />
        <h1>Rock Paper Scissors</h1>
        <img
          class="header-emoji"
          src="https://png.pngtree.com/png-vector/20241001/ourmid/pngtree-smiling-face-with-thumbs-up-emoji-png-image_13994371.png"
          alt="Thumbs up emoji"
        />
      </div>

      <div class="middle">
        <div class="choice">
          <h2 id="UserChoice">Your Choice: -</h2>
          <h2 id="ComputerChoice">Computer Choice: -</h2>
        </div>

        <div class="winner">
          <h2 id="winner">Winner: -</h2>
        </div>

        <div class="scoreboard">
          <h3 id="userScore">Your wins: 0</h3>
          <h3 id="compScore">Computer wins: 0</h3>
          <h3 id="draws">Draws: 0</h3>
        </div>
      </div>

      <div class="images">
        <img
          onclick="action('rock')"
          src="https://cdn-icons-png.flaticon.com/512/1998/1998612.png"
          alt="rock"
        />

        <img
          onclick="action('paper')"
          src="https://cdn-icons-png.flaticon.com/512/2541/2541988.png"
          alt="paper"
        />

        <img
          onclick="action('scissors')"
          src="https://cdn-icons-png.flaticon.com/512/1998/1998664.png"
          alt="scissors"
        />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
