<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="parent">
      <div class="header">
        <img
          class="header-emoji"
          src="https://png.pngtree.com/png-vector/20241001/ourmid/pngtree-smiling-face-with-thumbs-up-emoji-png-image_13994371.png"
        />

        <h1>Rock Paper Scissors</h1>

        <img
          class="header-emoji"
          src="https://png.pngtree.com/png-vector/20241001/ourmid/pngtree-smiling-face-with-thumbs-up-emoji-png-image_13994371.png"
        />
      </div>

      <div class="middle">
        <div class="choice">
          <h2 id="UserChoice">Your Choice: -</h2>
          <h2 id="ComputerChoice">Computer Choice: -</h2>
        </div>

        <div class="winner">
          <h2 id="winner">Winner: -</h2>
        </div>

        <div class="scoreboard">
          <h3 id="userScore">Your wins: 0</h3>
          <h3 id="compScore">Computer wins: 0</h3>
          <h3 id="draws">Draws: 0</h3>
        </div>
      </div>

      <div class="images">
        <i onclick="action('rock')" class="fa-solid fa-hand-back-fist"></i>

        <i onclick="action('paper')" class="fa-solid fa-hand"></i>

        <i onclick="action('scissors')" class="fa-solid fa-hand-peace"></i>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
